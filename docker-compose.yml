version: "3.9"

services:
  db:
    image: postgres:15
    container_name: expense_db
    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - postgres_data:/var/lib/postgresql/data

    # Optional: expose only for local dev (remove in prod)
    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build: .
    container_name: fastapi_expense_tracker
    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:rules%401234@db:5432/expense_db

    # Dev-only mount (remove in prod)
    volumes:
      - .:/app

    command: >
      sh -c "
      echo 'Waiting for DB...' &&
      until pg_isready -h db -U $${POSTGRES_USER}; do sleep 2; done &&
      alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data: